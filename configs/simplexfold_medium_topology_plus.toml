# Medium-depth SimplexFold profile using the allowed 5% AF2-medium headroom
# only for the sparse topological trunk.
#
# Parameter audit target:
#   AF2 medium baseline = configs/medium.toml with use_simplicial_evoformer=false
#   AF2 medium params:          3,106,642
#   this SimplexFold params:    3,256,126  (+149,484, +4.81%)
#   allowed 5% upper bound:     3,261,974
#
# Layer counts and the pair/MSA/structure trunk widths are intentionally
# unchanged from simplexfold_medium_param_matched.toml. The added capacity is
# restricted to persistent face/tetra states and the MSA-to-face adapter.

model_profile = "simplexfold_medium_topology_plus"
recommended_n_cycles = 4

# Channel dimensions.
c_m = 80
c_s = 136
c_z = 40
c_t = 36
c_e = 40

# Main MSA row / column attention.
dim = 12
num_heads = 8

msa_transition_n = 4
outer_product_dim = 12

# Pair stack.
triangle_mult_c = 40
triangle_dim = 12
triangle_num_heads = 4
pair_transition_n = 4

# Template pair stack.
template_pair_num_blocks = 2
template_pair_dropout = 0.0
template_pointwise_attention_dim = 12
template_pointwise_num_heads = 4
template_triangle_mult_c = 20
template_triangle_attn_c = 20
template_triangle_attn_num_heads = 4
template_pair_transition_n = 2

# Extra MSA stack.
extra_msa_dim = 8
extra_msa_dropout = 0.0
extra_pair_dropout = 0.0
msa_column_global_attention_dim = 8
num_extra_msa = 2

# Main Evoformer depth is unchanged from medium.
num_evoformer = 4
evoformer_msa_dropout = 0.0
evoformer_pair_dropout = 0.0

# Sparse SimplexFold adapter.
use_simplicial_evoformer = true
simplex_every_n_blocks = 1
simplex_neighbor_k = 12
simplex_c_face = 28
simplex_c_tetra = 14
simplex_hidden_dim = 87
simplex_use_faces = true
simplex_use_tetra = true
simplex_use_msa_to_face = false
simplex_msa_to_face_rank = 16
simplex_use_recycled_geometry = true
simplex_local_neighbor_k = 0
simplex_local_radius = 4
simplex_local_bias = 5.0
simplex_long_min_sep = 24
simplex_long_bias = 0.0
simplex_geometry_distance_weight = 0.1
simplex_rbf_bins = 8
simplex_sequence_max = 64.0
simplex_distance_max = 32.0
simplex_area_max = 300.0
simplex_volume_scale = 1000.0
simplex_dropout = 0.0
simplex_single_transition_n = 2

# Structure Module depth is unchanged from medium.
structure_module_c = 40
structure_module_layers = 4
structure_module_dropout_ipa = 0.0
structure_module_dropout_transition = 0.0
sidechain_num_channel = 40
sidechain_num_residual_block = 2
position_scale = 10.0
zero_init = true

# Invariant Point Attention.
ipa_num_heads = 8
ipa_c = 12
ipa_n_query_points = 4
ipa_n_value_points = 8

# Auxiliary heads.
n_dist_bins = 64
plddt_hidden_dim = 32
n_plddt_bins = 50
n_msa_classes = 23
n_pae_bins = 64
