# Medium-width SimplexFold profile near the AF2-medium parameter budget.
#
# Parameter audit target:
#   AF2 medium baseline = minAlphaFold2 configs/medium.toml
#   AF2 medium params:             3,106,642
#   this SimplexFold params:       3,348,544  (+241,902, +7.8%)
#
# Widths are intentionally unchanged from the AF2/SimplexFold medium profile.
# The parameter budget is approached only by reducing learned stack depth:
#   template_pair_num_blocks = 0
#   num_extra_msa = 0
#   num_evoformer = 2
#
# The structure module keeps 4 iterations because those iterations reuse a
# shared parameter set in this implementation, so changing the iteration count
# does not change the model parameter count.

model_profile = "simplexfold_medium_width_matched"
recommended_n_cycles = 4

# Channel dimensions.
c_m = 128
c_s = 192
c_z = 64
c_t = 64
c_e = 64

# Main MSA row / column attention.
dim = 16
num_heads = 8

msa_transition_n = 4
outer_product_dim = 16

# Pair stack.
triangle_mult_c = 64
triangle_dim = 16
triangle_num_heads = 4
pair_transition_n = 4

# Template pair stack. Templates are disabled for NanoFold runs; setting the
# learned template stack depth to zero removes unused parameters while preserving
# the AF2-medium template embedding widths.
template_pair_num_blocks = 0
template_pair_dropout = 0.0
template_pointwise_attention_dim = 16
template_pointwise_num_heads = 4
template_triangle_mult_c = 32
template_triangle_attn_c = 32
template_triangle_attn_num_heads = 4
template_pair_transition_n = 2

# Extra MSA stack. The embedding width is preserved, but the learned stack depth
# is zero for the width-matched parameter budget.
extra_msa_dim = 8
extra_msa_dropout = 0.0
extra_pair_dropout = 0.0
msa_column_global_attention_dim = 8
num_extra_msa = 0

# Main Evoformer depth is reduced from medium's 4 blocks.
num_evoformer = 2
evoformer_msa_dropout = 0.0
evoformer_pair_dropout = 0.0

# Sparse SimplexFold adapter.
use_simplicial_evoformer = true
simplex_every_n_blocks = 1
simplex_neighbor_k = 12
simplex_c_face = 32
simplex_c_tetra = 16
simplex_hidden_dim = 128
simplex_use_faces = true
simplex_use_tetra = true
simplex_use_msa_to_face = false
simplex_msa_to_face_rank = 16
simplex_use_recycled_geometry = true
simplex_local_neighbor_k = 0
simplex_local_radius = 4
simplex_local_bias = 5.0
simplex_long_min_sep = 24
simplex_long_bias = 0.0
simplex_geometry_distance_weight = 0.1
simplex_rbf_bins = 8
simplex_sequence_max = 64.0
simplex_distance_max = 32.0
simplex_area_max = 300.0
simplex_volume_scale = 1000.0
simplex_dropout = 0.0
simplex_single_transition_n = 2

# Structure Module.
structure_module_c = 64
structure_module_layers = 4
structure_module_dropout_ipa = 0.0
structure_module_dropout_transition = 0.0
sidechain_num_channel = 64
sidechain_num_residual_block = 2
position_scale = 10.0
zero_init = true

# Invariant Point Attention.
ipa_num_heads = 8
ipa_c = 16
ipa_n_query_points = 4
ipa_n_value_points = 8

# Auxiliary heads.
n_dist_bins = 64
plddt_hidden_dim = 64
n_plddt_bins = 50
n_msa_classes = 23
n_pae_bins = 64
