# Tiny profile — shrunk-to-CPU version of the AlphaFold2 monomer config.
# Every channel dim, head count, and block count is reduced so test_shapes
# runs in seconds. Default profile for tests and quick smoke runs.

model_profile = "tiny"

# Channel dimensions (supplement 1.5).
c_m = 32
c_s = 32
c_z = 16
c_t = 16
c_e = 24

# Main MSA row / column attention (Algorithm 7, 8).
dim = 8
num_heads = 4

# MSA transition widening factor (Algorithm 9).
msa_transition_n = 2

# Outer product mean hidden dim (Algorithm 10).
outer_product_dim = 8

# Triangle multiplicative updates (Algorithms 11, 12).
triangle_mult_c = 16

# Triangle self-attention (Algorithms 13, 14).
triangle_dim = 8
triangle_num_heads = 2

# Pair transition widening factor (Algorithm 15).
pair_transition_n = 2

# Template pair stack (supplement 1.7.1, Algorithms 16, 17).
template_pair_num_blocks = 1
template_pair_dropout = 0.0
template_pointwise_attention_dim = 8
template_pointwise_num_heads = 2
template_triangle_mult_c = 16
template_triangle_attn_c = 8
template_triangle_attn_num_heads = 2
template_pair_transition_n = 2

# Extra MSA stack (supplement 1.7.2, Algorithms 18, 19).
extra_msa_dim = 8
extra_msa_dropout = 0.0
extra_pair_dropout = 0.0
msa_column_global_attention_dim = 8
num_extra_msa = 1

# Main Evoformer (Algorithm 6).
num_evoformer = 1
evoformer_msa_dropout = 0.0
evoformer_pair_dropout = 0.0

# Sparse SimplexFold adapter.
use_simplicial_evoformer = true
simplex_every_n_blocks = 1
simplex_neighbor_k = 4
simplex_c_face = 12
simplex_c_tetra = 8
simplex_hidden_dim = 32
simplex_use_faces = true
simplex_use_tetra = true
simplex_use_msa_to_face = false
simplex_msa_to_face_rank = 8
simplex_use_recycled_geometry = true
simplex_local_radius = 2
simplex_local_bias = 4.0
simplex_long_min_sep = 6
simplex_long_bias = 0.0
simplex_geometry_distance_weight = 0.1
simplex_rbf_bins = 4
simplex_sequence_max = 16.0
simplex_distance_max = 32.0
simplex_area_max = 300.0
simplex_volume_scale = 1000.0
simplex_dropout = 0.0
simplex_single_transition_n = 2

# Structure Module (supplement 1.8, Algorithm 20).
structure_module_c = 16
structure_module_layers = 2
structure_module_dropout_ipa = 0.0
structure_module_dropout_transition = 0.0
sidechain_num_channel = 16
sidechain_num_residual_block = 2
position_scale = 10.0
zero_init = true

# Invariant Point Attention (supplement 1.8.2, Algorithm 22).
ipa_num_heads = 4
ipa_c = 8
ipa_n_query_points = 4
ipa_n_value_points = 4

# Auxiliary heads.
n_dist_bins = 64        # distogram (supplement 1.9.8)
plddt_hidden_dim = 32   # pLDDT MLP hidden (supplement 1.9.6)
n_plddt_bins = 50       # pLDDT output bins (supplement 1.9.6)
n_msa_classes = 23      # masked MSA head (supplement 1.9.9)
n_pae_bins = 64         # PAE / pTM head (supplement 1.9.7)
